<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <meta name="description" content="En personlig dashboard som visar datum, tid, väderprognos och inspirerande citat.">

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400..700;1,400..700&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">

    <meta http-equiv="Content-Security-Policy" 
      content="
      default-src 'self'; 
      script-src 'self' https://code.jquery.com 'sha256-vvt4KWwuNr51XfE5m+hzeNEGhiOfZzG97ccfqGsPwvE=';
      style-src 'self' https://fonts.googleapis.com;
      font-src 'self' https://fonts.gstatic.com;
      connect-src 'self' https://dummyjson.com/quotes/random https://opendata-download-metfcst.smhi.se/;">

</head>
<body>
    <main>
    <div class="grid-container">
            <section id="hem">
                <img src="img/morgonbild.jpg" alt="En vacker soluppgång över en sjö i Sverige." id="morgonbild">
                <h1 id="godmorgon" class="lora-font">God morgon</h1>
                <h2 id="datumtid" class="lora-font">Hämtar datum och tid...</h2>
            </section>

        <section id="citat">
            <h2 id="citat-header" class="lora-font">Dagens citat</h2>
            <p id="citat-text" class="lora-font">Laddar citat...</p>
            <p id="författare" class="lora-font"></p>
        </section>

        <section id="vader_container">
            <h2 id="vader-header" class="lora-font">Väderprognos 7 dagar</h2>
            <section id="vader1">  
                <h3 id="vaderDag1" class="lora-font">Dag 1</h3>
                <div id="temperatur1"  class="lora-font">Laddar väder...</div>
                <div id="vind1" class="lora-font"></div>
                <div id="vindbyar1" class="lora-font"></div>
                <div id="nederbord1" class="lora-font"></div>

                <div id="nederbord3" class="lora-font"></div>
                <div id="lufttryck3" class="lora-font"></div>
            </section>
            <section id="vader4">
                <h3 id="vaderDag4" class="lora-font">Dag 4</h3>
